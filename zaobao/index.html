const dates = Object.keys(briefings).sort().reverse();
let cur = 0;
const today = dates[0];

function rn(n) { return n <= 3 ? 'n' + n : 'nn'; }

function render(ds) {
  const d = briefings[ds];
  if (!d) return;
  let html = '<div class="briefing active">';

  // 抖音
  html += '<div class="sec"><div class="sec-head">📱 抖音热榜 Top 10</div>';
  d.douyin.forEach(i => {
    html += '<div class="rk" onclick="window.open(\'' + i.url + '\',\'_blank\')"><div class="rk-top"><div class="rk-n ' + rn(i.rank) + '">' + i.rank + '</div><div class="rk-t">' + i.title + '</div><div class="rk-h">🔥' + i.hot + '</div></div></div>';
  });
  html += '</div>';

  // 微博
  html += '<div class="sec"><div class="sec-head">🔥 微博热搜</div>';
  d.weibo.forEach(i => {
    html += '<div class="wb" onclick="window.open(\'' + i.url + '\',\'_blank\')"><div class="wb-top"><div class="wb-r">#' + i.rank + '</div><div class="wb-t">' + i.title + '</div><div class="wb-h">' + i.hot + '</div></div><div class="wb-d">' + i.desc + '</div></div>';
  });
  html += '</div>';

  // 每日爆款分析
  const v = d.viral;
  html += '<div class="sec"><div class="sec-head">🎯 每日爆款分析</div>';
  html += '<div class="viral"><div class="v-title"><span class="v-tag">' + v.tag + '</span>' + v.title + '</div><div class="v-meta"><span>' + v.platform + '</span><span>' + v.data + '</span><span>' + v.author + '</span></div><div class="v-section"><div class="v-label">🔥 为什么火</div><div class="v-body">' + v.why + '</div></div><div class="v-section"><div class="v-label">📐 内容结构拆解</div><div class="v-body">' + v.structure.replace(/\n/g, '<br>') + '</div></div><div class="v-section"><div class="v-label">💡 普通人能学什么</div><div class="v-body">' + v.learn + '</div></div></div>';
  html += '</div>';

  // 选题灵感
  html += '<div class="sec"><div class="sec-head">💡 今日选题灵感</div>';
  d.ideas.forEach(i => {
    html += '<div class="idea"><div class="idea-h"><div class="idea-n">' + i.num + '</div><div class="idea-t">' + i.title + '</div></div><div class="idea-b">' + i.body + '</div></div>';
  });
  html += '</div>';

  // 蹭热点
  html += '<div class="sec"><div class="sec-head">🎯 蹭热点参考</div>';
  d.tips.forEach(i => {
    html += '<div class="tip"><div class="tip-h"><span class="tip-tt ' + i.tc + '">' + i.tag + '</span><div class="tip-ti">' + i.title + '</div></div><div class="tip-b">' + i.body + '</div></div>';
  });
  html += '</div>';

  html += '</div>';
  document.getElementById('briefingContainer').innerHTML = html;

  // 归档
  let arch = '';
  dates.forEach(dd => {
    const b = briefings[dd];
    const act = dd === ds;
    arch += '<div class="ad" onclick="go(\'' + dd + '\')"><span>' + (act ? '👉 ' : '') + (b ? b.date : dd) + '</span><span class="wk">' + (b ? b.week : '') + '</span></div>';
  });
  document.getElementById('archiveDays').innerHTML = arch;
  document.getElementById('currentDate').textContent = d.date;
  document.getElementById('weekTag').textContent = d.week;
  document.getElementById('prevBtn').disabled = cur >= dates.length - 1;
  document.getElementById('nextBtn').disabled = cur <= 0;
}

function go(d) { cur = dates.indexOf(d); if (cur >= 0) render(d); }
document.getElementById('prevBtn').onclick = function() { if (cur < dates.length - 1) { cur++; render(dates[cur]); } };
document.getElementById('nextBtn').onclick = function() { if (cur > 0) { cur--; render(dates[cur]); } };

render(today);
</script>
