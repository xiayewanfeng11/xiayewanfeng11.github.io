// ================================================================
// 渲染引擎
// ================================================================
const dates = Object.keys(briefings).sort().reverse();
let cur = 0;
const today = dates[0];

function rn(n) { if (n<=3) return 'r'+n; return 'rn'; }

function render(ds) {
  const d = briefings[ds];
  if (!d) return;

  let html = `<div class="briefing active">`;

  // 抖音热榜
  html += `<div class="sec"><div class="sec-head"><span class="emoji">📱</span> 抖音热榜 Top 10</div>`;
  d.douyin.forEach(item => {
    html += `<div class="rank-card" onclick="window.open('${item.url}','_blank')">
      <div class="rank-top">
        <div class="rank-num ${rn(item.rank)}">${item.rank}</div>
        <div class="rank-title">${item.title}</div>
        <div class="rank-hot">🔥 ${item.hot}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // 小红书热榜
  html += `<div class="sec"><div class="sec-head"><span class="emoji">📕</span> 小红书热榜 Top 10</div>`;
  d.xiaohongshu.forEach(item => {
    html += `<div class="rank-card" onclick="window.open('${item.url}','_blank')">
      <div class="rank-top">
        <div class="rank-num ${rn(item.rank)}">${item.rank}</div>
        <div class="rank-title">${item.title}</div>
        <div class="rank-hot">❤️ ${item.hot}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // 微博热搜
  html += `<div class="sec"><div class="sec-head"><span class="emoji">🔥</span> 微博热搜精选</div>`;
  d.weibo.forEach(item => {
    html += `<div class="rank-card" onclick="window.open('${item.url}','_blank')">
      <div class="rank-top">
        <div class="rank-title">${item.title}</div>
        <div class="rank-hot">${item.hot}</div>
      </div>
      <div class="rank-desc">${item.desc}</div>
    </div>`;
  });
  html += `</div>`;

  // 蹭热点参考（5条）
  html += `<div class="sec"><div class="sec-head"><span class="emoji">🎯</span> 蹭热点参考</div>`;
  d.tips.forEach(item => {
    html += `<div class="tip-card" onclick="window.open('${item.url}','_blank')">
      <div class="tip-header">
        <span class="tip-tag ${item.tagClass}">${item.tag}</span>
        <div class="tip-title">${item.title}</div>
      </div>
      <div class="tip-body">${item.body}</div>
    </div>`;
  });
  html += `</div>`;

  // BGM
  html += `<div class="sec"><div class="sec-head"><span class="emoji">🎵</span> 今日热门 BGM</div>`;
  d.bgm.forEach((item, i) => {
    html += `<div class="bgm-card" onclick="window.open('${item.url}','_blank')">
      <div class="bgm-num">${String(i+1).padStart(2,'0')}</div>
      <div class="bgm-info">
        <div class="bgm-name">${item.name}</div>
        <div class="bgm-artist">${item.artist}</div>
      </div>
      <div class="bgm-tag">${item.tag}</div>
    </div>`;
  });
  html += `</div>`;

  // 行业动态
  html += `<div class="sec"><div class="sec-head"><span class="emoji">📰</span> 行业动态</div>`;
  d.news.forEach(item => {
    html += `<div class="news-card" onclick="window.open('${item.url}','_blank')">
      <div class="nc-title">${item.title}</div>
      ${item.desc ? `<div class="nc-desc">${item.desc}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  // 本地
  html += `<div class="sec"><div class="sec-head"><span class="emoji">📍</span> 昆明 · 本地</div>`;
  d.local.forEach(item => {
    html += `<div class="news-card" onclick="window.open('${item.url}','_blank')">
      <div class="nc-title">${item.title}</div>
      ${item.desc ? `<div class="nc-desc">${item.desc}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  html += `</div>`;
  document.getElementById('briefingContainer').innerHTML = html;

  // 归档
  let arch = '';
  dates.forEach(dd => {
    const b = briefings[dd];
    const act = dd === ds;
    arch += `<div class="day" onclick="go('${dd}')">
      <span>${act ? '👉 ' : ''}${b ? b.date : dd}</span>
      <span class="wk">${b ? b.week : ''}</span>
    </div>`;
  });
  document.getElementById('archiveDays').innerHTML = arch;
  document.getElementById('currentDate').textContent = d.date;
  document.getElementById('weekTag').textContent = d.week;
  document.getElementById('prevBtn').disabled = cur >= dates.length - 1;
  document.getElementById('nextBtn').disabled = cur <= 0;
}

function go(d) { cur = dates.indexOf(d); if (cur>=0) render(d); }
document.getElementById('prevBtn').onclick = () => { if (cur < dates.length-1) { cur++; render(dates[cur]); } };
document.getElementById('nextBtn').onclick = () => { if (cur > 0) { cur--; render(dates[cur]); } };

render(today);
</script>
