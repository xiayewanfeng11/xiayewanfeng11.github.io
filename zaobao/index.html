<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日简讯 · 雷姆</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
    background:#f7f3ee; color:#2c2416;
  }

  .header {
    background:linear-gradient(135deg, #1a1a2e, #16213e);
    color:#f0ece3; text-align:center;
    padding:2.5rem 1rem 1.8rem;
    position:relative; overflow:hidden;
  }
  .header::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 20% 30%, rgba(192,57,43,.12) 0%, transparent 60%),
               radial-gradient(circle at 80% 70%, rgba(184,134,11,.08) 0%, transparent 50%);
  }
  .header h1 { font-size:clamp(1.4rem,2.8vw,2rem); font-weight:900; position:relative; z-index:1; }
  .header p { font-size:clamp(0.75rem,1.1vw,0.9rem); color:rgba(240,236,227,.5); margin-top:0.4rem; position:relative; z-index:1; }

  .date-nav {
    max-width:800px; margin:0 auto; padding:1rem 1rem 0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .date-nav .left {}
  .date-nav .current-date { font-size:clamp(0.95rem,1.5vw,1.2rem); font-weight:700; color:#2c2416; }
  .date-nav .sub { font-size:0.75rem; color:#bbb; margin-top:0.1rem; }
  .date-nav .arrows { display:flex; gap:0.4rem; }
  .date-nav .arrows button {
    width:34px; height:34px; border-radius:50%; border:1px solid rgba(0,0,0,.08);
    background:#fff; font-size:1rem; cursor:pointer;
    transition:all .15s;
    display:flex; align-items:center; justify-content:center; color:#555;
  }
  .date-nav .arrows button:hover { border-color:#c0392b; color:#c0392b; }
  .date-nav .arrows button:disabled { opacity:0.25; cursor:default; }

  .container { max-width:800px; margin:0 auto; padding:0 1rem 3rem; }

  .briefing { margin-top:0.5rem; display:none; }
  .briefing.active { display:block; }

  .sec-title {
    font-size:0.85rem; font-weight:700; color:#c0392b;
    margin:1.2rem 0 0.6rem; padding-bottom:0.3rem;
    border-bottom:1.5px solid rgba(192,57,43,.12);
    display:flex; align-items:center; gap:0.4rem;
  }
  .sec-title .emoji { font-size:0.9rem; }

  .news-item {
    background:#fff; border-radius:12px;
    padding:0.9rem 1rem;
    margin-bottom:0.6rem;
    border:1px solid rgba(0,0,0,.04);
    transition:all .15s;
    cursor:pointer;
  }
  .news-item:hover {
    transform:translateX(3px);
    border-color:rgba(192,57,43,.15);
    box-shadow:0 2px 8px rgba(0,0,0,.04);
  }
  .news-item:active { transform:translateX(0); }

  .news-item .title {
    font-size:clamp(0.9rem,1.4vw,1.05rem);
    font-weight:600; line-height:1.5; color:#2c2416;
  }
  .news-item .summary {
    font-size:clamp(0.78rem,1.2vw,0.88rem);
    color:#888; line-height:1.7;
    margin-top:0.3rem;
  }
  .news-item .meta {
    display:flex; align-items:center; gap:0.4rem;
    margin-top:0.35rem; flex-wrap:wrap;
  }
  .news-item .meta .src {
    font-size:0.68rem; color:#bbb;
  }
  .news-item .meta .link-icon {
    font-size:0.6rem; color:#c0392b; opacity:0.4;
  }

  .tag { display:inline-block; font-size:0.62rem; padding:0.1rem 0.5rem; border-radius:4px; font-weight:600; }
  .tag-hot     { background:rgba(192,57,43,.08); color:#c0392b; }
  .tag-ai      { background:rgba(184,134,11,.08); color:#b8860b; }
  .tag-local   { background:rgba(44,36,22,.06); color:#777; }
  .tag-market  { background:rgba(39,174,96,.08); color:#27ae60; }
  .tag-product { background:rgba(52,152,219,.08); color:#2980b9; }

  .archive-box {
    margin-top:1.5rem;
    background:rgba(255,255,255,.3);
    border-radius:12px; padding:1rem 1rem;
    border:1px solid rgba(0,0,0,.04);
  }
  .archive-box h3 {
    font-size:0.8rem; font-weight:700; color:#999; margin-bottom:0.4rem;
  }
  .archive-box .day {
    display:flex; justify-content:space-between; align-items:center;
    padding:0.35rem 0;
    border-bottom:1px solid rgba(0,0,0,.03);
    font-size:0.82rem; cursor:pointer; transition:color .1s;
  }
  .archive-box .day:last-child { border-bottom:none; }
  .archive-box .day:hover { color:#c0392b; }
  .archive-box .day .d {}
  .archive-box .day .s { font-size:0.68rem; color:#ccc; }

  .footer {
    text-align:center; padding:2rem 1rem;
    font-size:0.7rem; color:#ccc;
  }

  .skeleton { animation: sk 1.2s infinite; background:#e8e2da; border-radius:6px; height:1rem; margin-bottom:0.8rem; }
  @keyframes sk { 0%{opacity:.3} 50%{opacity:.6} 100%{opacity:.3} }

  @media(max-width:480px) {
    .header { padding:2rem 1rem 1.4rem; }
    .news-item { padding:0.7rem 0.8rem; }
    .news-item .title { font-size:0.9rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📰 每日简讯 · 雷姆</h1>
  <p>每天早上 9:00 更新 · 陪主人开启新的一天</p>
</div>

<div class="date-nav">
  <div class="left">
    <div class="current-date" id="currentDate">2026年5月24日 · 星期日</div>
    <div class="sub" id="weekTag">第21周</div>
  </div>
  <div class="arrows">
    <button id="prevBtn" onclick="prev()">‹</button>
    <button id="nextBtn" onclick="next()">›</button>
  </div>
</div>

<div class="container">
  <div id="briefingContainer">
    <div class="skeleton" style="width:35%"></div>
    <div class="skeleton"></div>
    <div class="skeleton" style="width:60%"></div>
    <div class="skeleton"></div>
  </div>

  <div class="archive-box">
    <h3>📁 历史简讯</h3>
    <div id="archiveDays"></div>
  </div>
</div>

<div class="footer">🩵 雷姆 · 主人今天也要加油呀</div>

<script>
// ========== 简讯数据（每天更新从这里改） ==========
const briefings = {
  "2026-05-24": {
    date: "2026年5月24日 · 星期日",
    week: "第21周",
    sections: [
      {
        title: "🔥 今日热点",
        emoji: "🔥",
        items: [
          {
            title: "OpenAI发布GPT-5.1，推理能力大幅提升",
            tag: "hot", source: "TechCrunch",
            url: "https://techcrunch.com/2026/05/23/openai-gpt-5-1",
            summary: "新模型在数学推理和代码生成方面提升显著，尤其在多步推理任务上准确率提高约20%。API价格维持不变，开发者可以更低的成本获得更强的推理能力。同时引入了新的上下文窗口优化机制。"
          },
          {
            title: "抖音本地生活GMV同比增长67%",
            tag: "market", source: "36氪",
            url: "https://36kr.com/p/123456",
            summary: "餐饮类目贡献了最大增量，其中昆明地区增速（82%）高于全国平均水平。火锅、米线、烧烤三大品类增长最快。平台正在测试直播团购新入口，对餐饮老板来说是新的流量机会。"
          },
          {
            title: "昆明地铁5号线客流创历史新高",
            tag: "local", source: "昆明发布",
            url: "https://www.kunming.cn/news/2026-05-23/12345",
            summary: "周末单日客流突破45万人次，斗南站增幅最大。世博园站、滇池国际会展中心站客流也明显上升。春城夏季旅游旺季提前到来，建议餐饮店关注地铁沿线的客流变化。"
          }
        ]
      },
      {
        title: "🤖 AI 前沿",
        emoji: "🤖",
        items: [
          {
            title: "字节跳动发布视频生成模型VideoGen2",
            tag: "ai", source: "量子位",
            url: "https://www.qbitai.com/2026/05/54321",
            summary: "VideoGen2 支持最长10分钟的视频生成，画面一致性和动作连贯性相比上一代大幅提升。同时开放了API接口，创作者可以用它来生成视频素材。对短视频创作者来说可能是一个效率工具。"
          },
          {
            title: "阿里通义千问上线Mac客户端",
            tag: "ai", source: "IT之家",
            url: "https://www.ithome.com/0/789/456.htm",
            summary: "支持离线使用、文件上传分析、语音输入等功能。Mac用户可直接在桌面端调用大模型能力，支持代码解释、长文档总结等场景。Windows版本预计下月上线。"
          }
        ]
      },
      {
        title: "📈 营销参考",
        emoji: "📈",
        items: [
          {
            title: "母亲节餐饮数据：到店率同比增32%",
            tag: "market", source: "美团报告",
            url: "https://about.meituan.com/research/2026/mothers-day",
            summary: "母亲节当天餐饮到店消费同比增长32%，其中鲜花饼、蛋糕类甜品搜索量增长200%。建议餐饮老板提前2周布局节日内容营销，节日当天发布视频的效果最好。昆明地区鲜花饼礼盒套餐最受欢迎。"
          },
          {
            title: "小红书本地生活上线团购功能",
            tag: "product", source: "亿邦动力",
            url: "https://www.ebrun.com/202605/123456.shtml",
            summary: "小红书正式开放本地生活团购功能，餐饮类目率先上线。用户可以在笔记中直接下单购买团购套餐，对餐饮老板来说是新的免费流量入口。目前处于内测阶段，建议尽早入驻抢占位置。"
          }
        ]
      },
      {
        title: "📍 昆明 · 本地",
        emoji: "📍",
        items: [
          {
            title: "呈贡今日天气：多云 18~26℃",
            tag: "local", source: "中国天气网",
            url: "https://www.weather.com.cn/weather/530121.shtml",
            summary: ""
          },
          {
            title: "昆明米线节本周六在官渡古镇举办",
            tag: "local", source: "春城晚报",
            url: "https://www.ccwb.cn/2026/0523/123456",
            summary: "60+家本地米线店参加，现场有评选活动，各店招牌米线集中展示。适合餐饮老板去现场考察学习，也适合拍视频素材。活动免费入场。"
          },
          {
            title: "斗南花市夏季鲜花价格同比下降15%",
            tag: "local", source: "都市时报",
            url: "https://www.dssb.cn/2026/05/23/789012",
            summary: "玫瑰、百合等主流鲜花价格较去年同期下降15%左右，花量充足。对餐饮店来说，用鲜花做店面装饰或拍摄道具的成本降低了，适合拍一些氛围感内容。"
          }
        ]
      }
    ]
  }
};

const dates = Object.keys(briefings).sort().reverse();
let cur = 0;
const today = "2026-05-24";

function tagClass(t) {
  const map = { hot:'tag-hot', ai:'tag-ai', local:'tag-local', market:'tag-market', product:'tag-product' };
  return map[t] || 'tag-hot';
}

function render(d) {
  const b = briefings[d];
  if (!b) return;
  const con = document.getElementById('briefingContainer');
  const arch = document.getElementById('archiveDays');
  let html = `<div class="briefing active">`;
  b.sections.forEach(s => {
    html += `<div class="sec-title"><span class="emoji">${s.emoji}</span> ${s.title}</div>`;
    s.items.forEach(item => {
      html += `<div class="news-item" onclick="window.open('${item.url || '#'}','_blank')">
        <div class="title"><span class="tag ${tagClass(item.tag)}">${item.tag === 'hot' ? '热点' : item.tag === 'ai' ? 'AI' : item.tag === 'local' ? '本地' : item.tag === 'market' ? '市场' : '产品'}</span> ${item.title}</div>
        ${item.summary ? `<div class="summary">${item.summary}</div>` : ''}
        <div class="meta">
          <span class="src">${item.source || ''}</span>
          ${item.url ? `<span class="link-icon">↗ 查看原文</span>` : ''}
        </div>
      </div>`;
    });
  });
  html += `</div>`;
  con.innerHTML = html;

  let ahtml = '';
  dates.forEach(dd => {
    const act = dd === d;
    const bb = briefings[dd];
    ahtml += `<div class="day" onclick="go('${dd}')" style="cursor:pointer;">
      <span class="d">${act ? '👉 ' : ''}${bb ? bb.date : dd}</span>
      <span class="s">${bb ? bb.week : ''}</span>
    </div>`;
  });
  arch.innerHTML = ahtml;

  document.getElementById('currentDate').textContent = b.date;
  document.getElementById('weekTag').textContent = b.week;
  document.getElementById('prevBtn').disabled = cur >= dates.length - 1;
  document.getElementById('nextBtn').disabled = cur <= 0;
}

function go(d) { cur = dates.indexOf(d); if (cur>=0) render(d); }
function prev() { if (cur < dates.length-1) { cur++; render(dates[cur]); } }
function next() { if (cur > 0) { cur--; render(dates[cur]); } }

render(today);
</script>
</body>
</html>
