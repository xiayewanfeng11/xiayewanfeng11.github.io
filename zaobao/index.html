        body: "① <b>实用科普</b> — "夏天必学的5个保命技能"，制作图文+动图教程\n② <b>本地探店</b> — 昆明游泳馆/水上乐园探店，暑期流量大\n③ <b>职业体验</b> — 救生员的一天vlog，职业体验类内容容易上热门\n④ <b>亲子方向</b> — 家长教孩子游泳/踩水的温馨记录，妈妈圈层精准触达" }
    ]
  }
};

const dates = Object.keys(briefings).sort().reverse();
let cur = 0;
const today = dates[0];

function rn(n) { if (n<=3) return 'r'+n; return 'rn'; }

function render(ds) {
  const d = briefings[ds];
  if (!d) return;
  let html = `<div class="briefing active">`;

  // 抖音热榜
  html += `<div class="sec"><div class="sec-head">📱 抖音热榜 Top 10</div>`;
  d.douyin.forEach(item => {
    html += `<div class="rank-card" onclick="window.open('${item.url}','_blank')">
      <div class="top"><div class="num ${rn(item.rank)}">${item.rank}</div>
      <div class="title">${item.title}</div><div class="hot">🔥 ${item.hot}</div></div></div>`;
  });
  html += `</div>`;

  // 微博热搜
  html += `<div class="sec"><div class="sec-head">🔥 微博热搜</div>`;
  d.weibo.forEach(item => {
    html += `<div class="wb-card" onclick="window.open('${item.url}','_blank')">
      <div class="wb-top">
        <div class="wb-rank">#${item.rank}</div>
        <div class="wb-title">${item.title}</div>
        <div class="wb-hot">${item.hot}</div>
      </div>
      <div class="wb-desc">${item.desc}</div></div>`;
  });
  html += `</div>`;

  // 蹭热点参考
  html += `<div class="sec"><div class="sec-head">🎯 蹭热点参考 · 详细版</div>`;
  d.tips.forEach(item => {
    html += `<div class="tip-card" onclick="window.open('${item.url}','_blank')">
      <div class="tip-head">
        <span class="tip-tag ${item.tc}">${item.tag}</span>
        <div class="tip-title">${item.title}</div>
      </div>
      <div class="tip-body">${item.body}</div></div>`;
  });
  html += `</div>`;

  html += `</div>`;
  document.getElementById('briefingContainer').innerHTML = html;

  // 归档
  let arch = '';
  dates.forEach(dd => {
    const b = briefings[dd];
    const act = dd === ds;
    arch += `<div class="day" onclick="go('${dd}')"><span>${act ? '👉 ' : ''}${b ? b.date : dd}</span><span class="wk">${b ? b.week : ''}</span></div>`;
  });
  document.getElementById('archiveDays').innerHTML = arch;
  document.getElementById('currentDate').textContent = d.date;
  document.getElementById('weekTag').textContent = d.week;
  document.getElementById('prevBtn').disabled = cur >= dates.length - 1;
  document.getElementById('nextBtn').disabled = cur <= 0;
}

function go(d) { cur = dates.indexOf(d); if (cur>=0) render(d); }
document.getElementById('prevBtn').onclick = () => { if (cur < dates.length-1) { cur++; render(dates[cur]); } };
document.getElementById('nextBtn').onclick = () => { if (cur > 0) { cur--; render(dates[cur]); } };

render(today);
</script>
</body>
</html>
